# Garage Object Storage — Dirty Page Cache Tuning
#
# System-wide settings to prevent Garage bulk uploads from starving
# co-located services (Postgres, flapjack, API server) on shared
# bare-metal servers.
#
# These values are strictly more conservative than kernel defaults
# (20/10/3000) and benefit all services. Safe to install unconditionally.
#
# Install: /etc/sysctl.d/99-garage.conf
# Apply:   sysctl --system
# Remove:  rm /etc/sysctl.d/99-garage.conf && sysctl --system

# Hard ceiling: processes block on write() at 10% RAM dirty (default 20%).
# Prevents Garage bulk uploads from consuming all page cache.
vm.dirty_ratio = 10

# Background flush starts at 5% RAM dirty (default 10%).
# Keeps writeback continuous and prevents I/O spikes that impact Postgres.
vm.dirty_background_ratio = 5

# Dirty pages older than 10s get flushed (default 30s).
# Reduces data-at-risk window after crash.
vm.dirty_expire_centisecs = 1000
